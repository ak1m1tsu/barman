services:
  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations:ro
      - bot-data:/app/data
    command: ["-path", "/migrations", "-database", "sqlite3:///app/data/barman.db", "up"]
    restart: "no"

  bot:
    image: "ghcr.io/ak1m1tsu/barman:${IMAGE_TAG}"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - bot-data:/app/data
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  bot-data:
