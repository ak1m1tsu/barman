name: CI/CD

on:
  push:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. BUILD ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=${SHORT_SHA}-$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-40)
            echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: ${{ env.IMAGE }}-migrate:latest

  # ── 2. LINT ─────────────────────────────────────────────────
  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run golangci-lint
        uses: docker://golangci/golangci-lint:latest
        with:
          args: golangci-lint run

  # ── 3. TEST ─────────────────────────────────────────────────
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  # ── 4. DEPENDENCY CHECK ─────────────────────────────────────
  dependency_check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # ── 5. DEPLOY (main only) ─────────────────────────────────
  deploy:
    needs: [build, lint, test, dependency_check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: IMAGE_TAG,BOT_TOKEN,BOT_APP_ID
          script: |
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            mkdir -p /opt/barman/configs /opt/barman/migrations

            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.prod.yml?ref=${{ github.sha }}" \
              | IMAGE_TAG="${IMAGE_TAG}" envsubst \
              > /opt/barman/docker-compose.yml

            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/migrations?ref=${{ github.sha }}" \
              | jq -r '.[] | "\(.name) \(.download_url)"' \
              | while read name url; do
                  curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$url" \
                    > /opt/barman/migrations/"$name"
                done

            printf 'discord:\n  token: "%s"\n  app_id: "%s"\n  guild_id: ""\ndatabase:\n  path: "/app/data/barman.db"\n' \
              "${{ secrets.BOT_TOKEN }}" "${{ secrets.BOT_APP_ID }}" \
              > /opt/barman/configs/config.yaml

            cd /opt/barman
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
