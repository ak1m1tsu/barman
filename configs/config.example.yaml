discord:
  token: "YOUR_BOT_TOKEN"
  app_id: "YOUR_APP_ID"
  guild_id: ""  # optional: register commands for one guild only (faster in dev)
  prefix: "!"   # prefix for message-based commands (e.g. !react hug)
  owner_ids:    # user IDs that bypass reaction cooldown
    - "324462804939833345"
  activity_type: "watching"   # playing | watching | listening | competing (leave empty to disable)
  activity_text: "аниме реакции"
database:
  path: "barman.db"

timeouts:
  handler: 10s  # timeout for Discord command and event handlers

notifications:
  webhook_url: "" # Discord webhook URL for bot notifications (errors + user actions; leave empty to disable)
