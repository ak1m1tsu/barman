discord:
  token: "YOUR_BOT_TOKEN"
  app_id: "YOUR_APP_ID"
  guild_id: ""  # optional: register commands for one guild only (faster in dev)
  prefix: "!"   # prefix for message-based commands (e.g. !react hug)
  owner_ids:    # user IDs that bypass reaction cooldown
    - "324462804939833345"
database:
  path: "barman.db"

timeouts:
  handler: 10s  # timeout for Discord command and event handlers

notifications:
  error_webhook_url: ""    # Discord webhook URL for error alerts (leave empty to disable)
  activity_webhook_url: "" # Discord webhook URL for user-action events (leave empty to disable)
