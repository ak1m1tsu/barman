version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ak1m1tsu/barman

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - govet
